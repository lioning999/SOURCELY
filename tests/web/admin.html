<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单看板 — 源采 Sourcely</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700;900&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/css/index.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" style="text-decoration:none;">
    <div class="brand">
      <span class="brand-cn">源采</span>
      <span class="brand-en">SOURCELY</span>
    </div>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">分析</a>
    <a href="checkout.html" class="nav-link">下单</a>
    <a href="admin.html" class="nav-link active">后台</a>
  </div>
</nav>

<main class="view active" style="display:block;">

  <section class="admin-card">
    <div class="admin-head">
      <h2>订单看板</h2>
      <span>共 3 笔订单 · 已收定金 $30.95</span>
    </div>

    <div style="overflow-x:auto;">
    <table class="atbl">
      <thead><tr><th>订单号</th><th>商品</th><th>客户</th><th>定金</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>
        <tr>
          <td>#001</td><td>泳衣 ×2</td><td>张三 · 泰国</td><td>$13.45</td>
          <td><span class="st pending">待采购</span></td>
          <td><button class="btn-sm" onclick="updateStatus(this,'ordered')">已下单 1688</button></td>
        </tr>
        <tr>
          <td>#002</td><td>泳衣 ×2</td><td>Linh · 越南</td><td>$13.50</td>
          <td><span class="st ordered">已采购</span></td>
          <td><button class="btn-sm" onclick="updateStatus(this,'received')">已收货拍照</button></td>
        </tr>
        <tr>
          <td>#003</td><td>泳衣 ×1</td><td>Maria · 印尼</td><td>$4.00</td>
          <td><span class="st photos">照片已发</span></td>
          <td>
            <button class="btn-sm" onclick="updateStatus(this,'paid')">客户付尾款</button>
            <button class="btn-sm" style="margin-top:4px" onclick="updateStatus(this,'shipped')">已发货</button>
          </td>
        </tr>
      </tbody>
    </table>
    </div>

    <div style="margin-top:var(--s6);padding-top:var(--s5);border-top:1px dotted var(--line);">
      <h3 class="sub-label">用户侧进度条</h3>
      <div class="flow-wrap">
        <span class="flow-step done">1. 定金已付</span>
        <span class="flow-sep">···</span>
        <span class="flow-step current">2. 已验货拍照</span>
        <span class="flow-sep">···</span>
        <span class="flow-step">3. 已发货</span>
      </div>
    </div>
  </section>
</main>

<script>
function updateStatus(btn, status) {
  var labels = {
    ordered: { text: '已下单 1688', cls: 'ordered' },
    received: { text: '已收货拍照', cls: 'ordered' },
    photos: { text: '照片已发送', cls: 'photos' },
    paid: { text: '尾款已付', cls: 'paid' },
    shipped: { text: '已发货', cls: 'paid' },
  };
  var label = labels[status];
  var td = btn.closest('td');
  var st = td.parentElement.querySelector('.st');
  st.textContent = label.text;
  st.className = 'st ' + label.cls;
  btn.remove();
  updateFlow();
}

function updateFlow() {
  var statuses = document.querySelectorAll('.atbl .st');
  var allShipped = Array.from(statuses).every(function(s) { return s.textContent === '已发货'; });
  if (allShipped) {
    var steps = document.querySelectorAll('.flow-step');
    steps.forEach(function(s) { s.classList.remove('current'); s.classList.add('done'); });
  }
}
</script>
</body>
</html>
