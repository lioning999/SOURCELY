<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f1f5f9;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.login-box {
  background: #fff;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  width: 360px;
}
.login-box h1 { font-size: 1.4rem; color: #1e293b; margin-bottom: 8px; }
.login-box p { font-size: 0.85rem; color: #94a3b8; margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 10px 14px;
  border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; outline: none;
}
.login-box input:focus { border-color: #3b82f6; }
.login-box button {
  width: 100%; padding: 10px; margin-top: 16px;
  background: #3b82f6; color: #fff; border: none; border-radius: 8px;
  font-size: 1rem; cursor: pointer;
}
.login-box button:hover { background: #2563eb; }
.error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 12px; display: none; }
</style>
</head>
<body>

<div class="login-box">
  <h1>管理后台</h1>
  <p>请输入管理员密码</p>
  <input type="password" id="password" placeholder="管理员密码" autofocus>
  <button id="loginBtn">登录</button>
  <p class="error-msg" id="errorMsg">密码错误</p>
</div>

<script type="module">
import { adminLogin } from './static/js/api.js';

document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('loginBtn').addEventListener('click', async function() {
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('errorMsg');

  if (!password) { errorEl.style.display = 'block'; errorEl.textContent = '请输入密码'; return; }

  try {
    const data = await adminLogin(password);
    if (data.code === 200 && data.data && data.data.token) {
      sessionStorage.setItem('admin_token', data.data.token);
      window.location.href = 'snapshots.html';
    } else {
      errorEl.style.display = 'block';
      errorEl.textContent = data.message || '密码错误';
    }
  } catch (e) {
    errorEl.style.display = 'block';
    errorEl.textContent = '网络错误，请检查后端是否启动';
  }
});
</script>

</body>
</html>
