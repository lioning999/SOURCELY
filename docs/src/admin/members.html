<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理 | 管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f1f5f9; color: #1e293b; }
.topbar {
  background: #1e293b; color: #fff; padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar h1 { font-size: 1.1rem; }
.topbar nav a { color: #94a3b8; text-decoration: none; margin-left: 20px; font-size: 0.9rem; }
.topbar nav a.active { color: #fff; }
.topbar nav a.logout { color: #ef4444; }
.toolbar {
  max-width: 1400px; margin: 16px auto 0; padding: 0 24px;
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}
.toolbar input[type=text] {
  padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; width: 260px; outline: none;
}
.toolbar input[type=text]:focus { border-color: #3b82f6; }
.toolbar button {
  padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
}
.btn-search { background: #3b82f6; color: #fff; }
.btn-search:hover { background: #2563eb; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-clear { background: #e2e8f0; color: #475569; }
.container { max-width: 1400px; margin: 12px auto; padding: 0 24px; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
th, td { padding: 10px 12px; text-align: left; font-size: 0.85rem; border-bottom: 1px solid #f1f5f9; }
th { background: #f8fafc; color: #64748b; font-weight: 600; }
tr:hover { background: #f8fafc; }
.tag-paid { background: #dcfce7; color: #16a34a; padding: 2px 8px; border-radius: 4px; font-size: 0.78rem; }
.tag-free { background: #f1f5f9; color: #64748b; padding: 2px 8px; border-radius: 4px; font-size: 0.78rem; }
.pagination { display: flex; gap: 8px; align-items: center; margin-top: 16px; font-size: 0.85rem; }
.pagination button {
  padding: 6px 12px; border: 1px solid #e2e8f0; border-radius: 4px; background: #fff; cursor: pointer;
}
.pagination button:disabled { opacity: 0.4; cursor: default; }
.pagination span { color: #64748b; }
.loading { text-align: center; padding: 40px; color: #94a3b8; }
</style>
</head>
<body>

<div class="topbar">
  <h1>管理后台</h1>
  <nav>
    <a href="snapshots.html">快照管理</a>
    <a href="members.html" class="active">用户管理</a>
    <a href="#" class="logout" id="logoutBtn">退出</a>
  </nav>
</div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="搜索 openid...">
  <button class="btn-search" id="searchBtn">搜索</button>
  <button class="btn-clear" id="clearBtn">清除</button>
  <button class="btn-danger" id="batchDeleteBtn" style="margin-left:auto;">批量删除</button>
</div>

<div class="container">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="selectAll"></th>
        <th>OpenID</th>
        <th>会员类型</th>
        <th>积分</th>
        <th>注册时间</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="5" class="loading">加载中...</td></tr>
    </tbody>
  </table>
  <div class="pagination" id="pagination"></div>
</div>

<script type="module">
import { fetchMembers, batchDeleteMembers } from './static/js/api.js';

let currentPage = 1, currentSearch = '';

document.getElementById('logoutBtn').addEventListener('click', function() {
  sessionStorage.removeItem('admin_token');
  window.location.href = 'login.html';
});

document.getElementById('searchBtn').addEventListener('click', function() {
  currentSearch = document.getElementById('searchInput').value.trim();
  currentPage = 1;
  loadData();
});

document.getElementById('clearBtn').addEventListener('click', function() {
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  currentPage = 1;
  loadData();
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('searchBtn').click();
});

document.getElementById('selectAll').addEventListener('change', function() {
  document.querySelectorAll('.row-checkbox').forEach(cb => { cb.checked = this.checked; });
});

document.getElementById('batchDeleteBtn').addEventListener('click', async function() {
  const checkedIds = [];
  document.querySelectorAll('.row-checkbox:checked').forEach(cb => { checkedIds.push(cb.value); });
  if (checkedIds.length === 0) { alert('请先勾选要删除的行'); return; }
  if (!confirm('确认删除 ' + checkedIds.length + ' 个用户？此操作不可恢复。')) return;

  try {
    const data = await batchDeleteMembers(checkedIds);
    alert('已删除 ' + data.data.deleted_count + ' 个用户');
    loadData();
  } catch (e) { alert('删除失败: ' + e.message); }
});

async function loadData() {
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="loading">加载中...</td></tr>';
  try {
    const data = await fetchMembers(currentPage, 20, currentSearch);
    const { items, total } = data.data;

    if (items.length === 0) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="loading">暂无数据</td></tr>';
    } else {
      document.getElementById('tableBody').innerHTML = items.map(function(item) {
        var tagClass = item.member_type === 'paid' ? 'tag-paid' : 'tag-free';
        return '<tr>' +
          '<td><input type="checkbox" class="row-checkbox" value="' + esc(item.openid || '') + '"></td>' +
          '<td>' + (item.openid || '') + '</td>' +
          '<td><span class="' + tagClass + '">' + esc(item.member_type_cn || '') + '</span></td>' +
          '<td>' + (item.points ?? 0) + '</td>' +
          '<td>' + (item.created_at ? item.created_at.substring(0, 19) : '') + '</td>' +
        '</tr>';
      }).join('');
    }

    var totalPages = Math.ceil(total / 20);
    var pagHtml = '';
    pagHtml += '<button ' + (currentPage <= 1 ? 'disabled' : '') + ' id="prevBtn">上一页</button>';
    pagHtml += '<span>第 ' + currentPage + ' / ' + totalPages + ' 页（共 ' + total + ' 条）</span>';
    pagHtml += '<button ' + (currentPage >= totalPages ? 'disabled' : '') + ' id="nextBtn">下一页</button>';
    document.getElementById('pagination').innerHTML = pagHtml;

    if (currentPage > 1) document.getElementById('prevBtn').addEventListener('click', function() { currentPage--; loadData(); });
    if (currentPage < totalPages) document.getElementById('nextBtn').addEventListener('click', function() { currentPage++; loadData(); });
  } catch (e) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="loading">网络错误</td></tr>';
  }
}

function esc(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadData();
</script>

</body>
</html>
