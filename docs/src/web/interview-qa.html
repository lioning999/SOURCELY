<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>追问预判 — 大学生职通车</title>
<link rel="stylesheet" href="static/css/common.css">
<style>
  /* ── 追问卡片 ──────────────────────────────── */
  .qa-card {
    background: var(--surface, #fff);
    border: 1px solid var(--border, #E8E3DC);
    border-radius: var(--radius-sm, 10px);
    padding: var(--sp-4, 20px);
    margin-bottom: var(--sp-3, 12px);
  }

  .qa-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--sp-2, 8px);
  }

  .qa-card-header-left {
    display: flex; align-items: center; gap: var(--sp-2, 8px);
  }

  .qa-card-num {
    font-size: var(--fs-xs, 12px);
    font-weight: 650;
    color: var(--text-soft, #6B6570);
  }

  .qa-card-layer {
    font-size: 11px;
    font-weight: 650;
    padding: 2px 8px;
    border-radius: 4px;
    line-height: 1.4;
  }
  .qa-card-layer.l1 { background: #E8F0FE; color: #1A56DB; }  /* 事实核查 */
  .qa-card-layer.l2 { background: #FEF3E4; color: #C46F1B; }  /* 能力边界 */
  .qa-card-layer.l3 { background: #E6F4EA; color: #137333; }  /* 成长潜力 */

  .qa-card-status {
    font-size: var(--fs-xs, 12px);
    font-weight: 650;
  }

  .qa-card-question {
    font-size: var(--fs-l, 18px);
    font-weight: 700;
    color: var(--text, #1E1E24);
    line-height: 1.5;
    margin-bottom: var(--sp-3, 12px);
  }

  .qa-card-intent {
    font-size: var(--fs-xs, 12px);
    color: var(--secondary, #1A7A6B);
    background: var(--secondary-soft, #EDF7F4);
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: var(--sp-3, 12px);
    line-height: 1.5;
  }

  .qa-card-answer {
    background: var(--bg, #FEFAF3);
    border-radius: var(--radius-sm, 10px);
    padding: var(--sp-3, 12px);
  }

  .qa-card-label {
    font-size: var(--fs-xs, 12px);
    font-weight: 700;
    color: var(--text-fade, #9B959F);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: var(--sp-1, 4px);
  }

  .qa-card-answer p {
    font-size: var(--fs-rpp, 14px);
    color: var(--text, #1E1E24);
    line-height: 1.8;
    margin: 0;
  }

  .qa-card-resolved {
    font-size: var(--fs-xs, 12px);
    color: var(--success, #1A7A6B);
    background: var(--success-soft, #EDF7F4);
    padding: 8px 12px;
    border-radius: 6px;
    margin-top: var(--sp-2, 8px);
    line-height: 1.5;
  }

  /* ── 摘要条 ────────────────────────────────── */
  .qa-summary {
    text-align: center;
    font-size: var(--fs-rpp, 14px);
    color: var(--text-soft, #6B6570);
    margin-bottom: var(--sp-4, 20px);
    padding: var(--sp-2, 8px) var(--sp-3, 12px);
    background: var(--bg, #FEFAF3);
    border-radius: var(--radius-sm, 10px);
  }

  /* ── 底部引导 ──────────────────────────────── */
  .qa-footer {
    text-align: center;
    margin-top: var(--sp-5, 28px);
    padding-top: var(--sp-4, 20px);
    border-top: 1px solid var(--border, #E8E3DC);
  }

  .qa-footer p {
    font-size: var(--fs-rpp, 14px);
    color: var(--text, #1E1E24);
    margin-bottom: var(--sp-1, 4px);
  }

  .qa-footer .hint {
    font-size: var(--fs-xs, 12px);
    color: var(--text-fade, #9B959F);
    margin-bottom: var(--sp-3, 12px);
  }
</style>
</head>
<body>
<div class="container">

  <!-- 顶栏 -->
  <div class="top-bar">
    <a href="result.html" class="back-btn">← 返回</a>
    <span class="logo"><img class="logo-icon" src="static/img/logo.png" alt="">大学生职通车</span>
  </div>

  <!-- 进度条 -->
  <div class="progress-bar">
    <div class="progress-step done"><span class="dot">✓</span>上传简历</div>
    <span class="progress-connector done"></span>
    <div class="progress-step done"><span class="dot">✓</span>免费诊断</div>
    <span class="progress-connector done"></span>
    <div class="progress-step done"><span class="dot">✓</span>优化结果</div>
    <span class="progress-connector done"></span>
    <div class="progress-step active"><span class="dot">4</span>追问预判</div>
    <span class="progress-connector"></span>
    <div class="progress-step coming"><span class="dot">5</span>模拟面试</div>
  </div>

  <!-- 页面头 -->
  <div class="page-head">
    <h1>追问预判</h1>
    <p class="page-sub" style="color:var(--text-soft);font-size:var(--fs-rpp);margin-top:var(--sp-1);">
      AI 分析你的简历弱点，预测面试官的追问方向
    </p>
  </div>

  <!-- 状态：加载 -->
  <div id="stateLoading" style="text-align:center;padding:var(--sp-10);">
    <div class="spinner" style="margin:0 auto var(--sp-3);"></div>
    <p style="color:var(--text-soft);">正在生成追问预判…</p>
    <p style="font-size:var(--fs-xs);color:var(--text-fade);margin-top:var(--sp-2);" id="loadingHint">预计等待 15-30 秒</p>
  </div>

  <!-- 状态：未登录 -->
  <div id="stateLogin" style="display:none;text-align:center;padding:var(--sp-10);">
    <p style="color:var(--text-soft);margin-bottom:var(--sp-4);">此功能需要微信登录</p>
    <button class="btn btn-primary" onclick="window.location.href='/auth/wechat-login'">微信登录 →</button>
  </div>

  <!-- 状态：错误 -->
  <div id="stateError" style="display:none;text-align:center;padding:var(--sp-10);">
    <p style="color:var(--danger);" id="errorMsg"></p>
    <button class="btn btn-secondary" id="btnRetry" style="margin-top:var(--sp-4);">重新加载</button>
  </div>

  <!-- 状态：无 diagnosis_id -->
  <div id="stateEmpty" style="display:none;text-align:center;padding:var(--sp-10);">
    <p style="color:var(--text-soft);margin-bottom:var(--sp-4);">请先完成简历诊断和优化</p>
    <a href="index.html" class="btn btn-primary">返回首页 →</a>
  </div>

  <!-- 主内容 -->
  <div id="mainContent" style="display:none;">

    <!-- 摘要 -->
    <div class="qa-summary" id="qaSummary" style="display:none;"></div>

    <!-- 追问卡片列表 -->
    <div id="qaList"></div>

    <!-- 底部引导 -->
    <div class="qa-footer">
      <p>🎯 准备好了吗？来模拟面试练习</p>
      <p class="hint">对着 AI 生成的面试题动手练一遍，比光看更有用</p>
      <a id="btnNext" class="btn btn-primary" href="interview-hub.html">进入模拟面试 →</a>
    </div>

  </div>

  <!-- 免责 -->
  <div class="disclaimer">以上内容由 AI 基于你的简历生成，仅供参考</div>

</div>
<script type="module" src="static/js/pages/interview-qa.js"></script>
</body>
</html>
