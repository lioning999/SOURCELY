<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>诊断报告 — 大学生职通车</title>
<link rel="stylesheet" href="static/css/common.css">
</head>
<body>
<div class="container">

  <!-- 顶栏 -->
  <div class="top-bar">
    <a href="index.html" class="back-btn">← 返回</a>
    <span class="logo"><img class="logo-icon" src="static/img/logo.png" alt="">大学生职通车</span>
  </div>

  <!-- 进度条 -->
  <div class="progress-bar">
    <div class="progress-step done"><span class="dot">✓</span>上传简历</div>
    <span class="progress-connector done"></span>
    <div class="progress-step active"><span class="dot">2</span>免费诊断</div>
    <span class="progress-connector"></span>
    <div class="progress-step"><span class="dot">3</span>优化预览</div>
    <span class="progress-connector"></span>
    <div class="progress-step coming"><span class="dot">4</span>追问预判</div>
    <span class="progress-connector"></span>
    <div class="progress-step coming"><span class="dot">5</span>模拟面试</div>
  </div>

  <!-- 页面头 -->
  <div class="page-head">
    <h1>诊断报告</h1>
  </div>

  <!-- 重复诊断提示（默认隐藏，is_rediagnosis 时展示） -->
  <div id="rediagnosisHint" style="display:none;text-align:center;font-size:var(--fs-xs);color:var(--text-soft);background:var(--card);border-radius:var(--radius-sm);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-3);line-height:1.6;">
    💡 你修改了简历，AI 重新诊断。注意：部分维度评分可能因整体评估视角变化而调整。
  </div>

  <!-- 加载/错误/空状态 -->
  <div id="stateLoading" style="text-align:center;padding:var(--sp-10);">
    <div class="spinner" style="margin:0 auto var(--sp-3);"></div>
    <p style="color:var(--text-soft);">正在加载诊断报告…</p>
  </div>

  <div id="stateError" style="display:none;text-align:center;padding:var(--sp-10);">
    <p style="color:var(--danger);" id="errorMsg"></p>
    <a href="index.html" class="btn btn-primary" style="margin-top:var(--sp-4);">← 返回首页重新诊断</a>
  </div>

  <div id="stateEmpty" style="display:none;text-align:center;padding:var(--sp-10);">
    <p style="color:var(--text-soft);">请先上传简历进行诊断</p>
    <a href="index.html" class="btn btn-primary" style="margin-top:var(--sp-4);">← 去上传简历</a>
  </div>

  <!-- 诊断内容（默认隐藏，数据加载后展示） -->
  <div id="mainContent" style="display:none;">

    <!-- 整体印象 -->
    <div class="diagnosis-summary" id="overallImpression"></div>

    <!-- 六维扫描 -->
    <div class="card">
      <div class="dimension-scan" id="dimensionScan"></div>
    </div>

    <!-- 致命问题 -->
    <div class="card" id="fatalCard">
      <div class="card-header">
        <div class="card-icon" style="background:#FFF0EF;">⚠️</div>
        <div>
          <div class="card-title" id="fatalTitle"></div>
          <div class="card-sub">不处理，面试会反复失分</div>
        </div>
      </div>
      <div id="fatalList"></div>
    </div>

    <!-- 追问靶子 -->
    <div class="card" id="targetCard" style="margin-top:var(--sp-4);">
      <div class="card-header">
        <div class="card-icon" style="background:#FFF9F0;">🎯</div>
        <div>
          <div class="card-title" id="targetTitle"></div>
          <div class="card-sub">优化简历后可查看完整答题思路</div>
        </div>
      </div>
      <div class="list-block" id="targetList"></div>
      <div style="text-align:center;padding:var(--sp-4) 0 0;">
        <a id="btnPreview" href="#" class="btn btn-primary" style="margin-bottom:var(--sp-1);">…</a>
        <div id="btnHint" style="font-size:var(--fs-xs);color:var(--text-soft);"></div>
      </div>
    </div>

    <!-- 免责 -->
    <div class="disclaimer">诊断结果基于 AI 模型，仅供参考</div>

  </div>

</div>
<script src="static/js/toast.js"></script>
<script type="module" src="static/js/pages/diagnosis.js"></script>
</body>
</html>
