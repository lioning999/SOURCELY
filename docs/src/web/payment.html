<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>确认打赏 — 大学生职通车</title>
<link rel="stylesheet" href="static/css/common.css">
</head>
<body>
<div class="container">

  <!-- 顶栏 -->
  <div class="top-bar">
    <a href="preview.html" class="back-btn">← 返回</a>
    <span class="logo"><img class="logo-icon" src="static/img/logo.png" alt="">大学生职通车</span>
  </div>

  <!-- 进度条 -->
  <div class="progress-bar">
    <div class="progress-step done"><span class="dot">✓</span>上传简历</div>
    <span class="progress-connector done"></span>
    <div class="progress-step done"><span class="dot">✓</span>免费诊断</div>
    <span class="progress-connector done"></span>
    <div class="progress-step active"><span class="dot">3</span>优化预览</div>
    <span class="progress-connector"></span>
    <div class="progress-step coming"><span class="dot">4</span>追问预判</div>
    <span class="progress-connector"></span>
    <div class="progress-step coming"><span class="dot">5</span>模拟面试</div>
  </div>

  <!-- 页面头 -->
  <div class="page-head">
    <h1>确认打赏</h1>
  </div>

  <!-- 登录 -->
  <div id="stateLogin" style="display:none;text-align:center;padding:var(--sp-10);">
    <p style="color:var(--text-soft);margin-bottom:var(--sp-4);">此功能需要微信登录</p>
    <button class="btn btn-primary" onclick="window.location.href='/auth/wechat-login'">微信登录 →</button>
  </div>

  <!-- 加载 -->
  <div id="stateLoading" style="display:none;text-align:center;padding:var(--sp-10);">
    <div class="spinner" style="margin:0 auto var(--sp-3);"></div>
    <p style="color:var(--text-soft);">创建订单中…</p>
  </div>

  <!-- 错误 -->
  <div id="stateError" style="display:none;text-align:center;padding:var(--sp-10);">
    <p style="color:var(--danger);" id="errorMsg"></p>
    <button class="btn btn-secondary" id="btnRetry" style="margin-top:var(--sp-4);">重新创建订单</button>
  </div>

  <!-- 步骤一：确认打赏 -->
  <div id="stateConfirm" style="display:none;">
    <div class="card">

      <div style="font-size:40px;text-align:center;margin-bottom:var(--sp-2);">✨</div>
      <div style="font-size:var(--fs-rpp);color:var(--text-soft);text-align:center;">AI 逐段重写，保留真实经历</div>

      <!-- 改写效果预览 -->
      <div style="background:var(--bg);border-radius:var(--radius-sm);padding:var(--sp-3);margin-bottom:var(--sp-4);">
        <div style="font-size:var(--fs-xs);color:var(--text-fade);margin-bottom:var(--sp-2);">改写效果预览</div>
        <div class="preview-compare">
          <div class="preview-col before">
            <div class="col-label">优化前</div>
            <p>负责日常数据整理与周报撰写</p>
          </div>
          <div class="preview-col after">
            <div class="col-label">优化后</div>
            <p>搭建自动化数据看板，周报产出效率提升 60%，月均节省 15 小时</p>
          </div>
        </div>
      </div>

      <!-- 服务内容 -->
      <div style="margin-bottom:var(--sp-3);">
        <div style="font-size:var(--fs-xs);color:var(--text-fade);margin-bottom:var(--sp-2);">支付后你将获得</div>
        <div style="font-size:var(--fs-rp);color:var(--text);line-height:2.2;">
          <div>📝 全文逐段重写</div>
          <div>🔍 每段优化前后对比</div>
          <div>🎯 面试追问预判 + 答题思路</div>
        </div>
      </div>

      <div style="text-align:center;font-size:var(--fs-xs);color:var(--text-fade);margin-bottom:var(--sp-3);">一次打赏 = 优化一份简历</div>

      <button class="btn btn-primary" id="btnConfirm">确认打赏 ¥1 →</button>

    </div>
  </div>

  <!-- 步骤二：扫码支付 -->
  <div id="stateQr" style="display:none;">
    <div class="card" style="text-align:center;">

      <div class="qr-wrap" id="qrWrap">
        <img id="qrImage" src="" alt="微信打赏二维码" style="width:200px;height:200px;">
      </div>

      <div class="pay-status" id="payStatus">
        <span class="spinner" style="width:16px;height:16px;"></span> 等待支付…
      </div>

      <div class="price" style="margin-bottom:var(--sp-1);" id="qrAmount">¥1</div>
      <div style="font-size:var(--fs-xs);color:var(--text-fade);margin-bottom:var(--sp-3);">全文重写 · 前后对比 · 追问预判</div>

      <div id="payTimer" style="font-size:var(--fs-xs);color:var(--text-fade);margin-bottom:var(--sp-2);"></div>
      <div id="payHint" style="font-size:var(--fs-xs);color:var(--text-fade);margin-bottom:var(--sp-3);">扫码后请勿关闭页面</div>

      <div id="payManual">
        <button class="btn btn-primary" id="btnManualCheck">我已支付，查看结果</button>
      </div>

      <div id="payActions" style="margin-top:var(--sp-3);display:none;">
        <button class="btn btn-primary" id="btnReOrder">重新下单</button>
      </div>

    </div>
  </div>

  <!-- 免责 -->
  <div class="disclaimer">支付问题请联系客服</div>

</div>
<script src="static/js/toast.js"></script>
<script type="module" src="static/js/pages/payment.js"></script>
</body>
</html>
