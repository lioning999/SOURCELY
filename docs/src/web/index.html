<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>大学生职通车 — 简历免费诊断</title>
<link rel="stylesheet" href="static/css/common.css">
</head>
<body>
<div class="container">

  <!-- 顶栏 -->
  <div class="top-bar" style="justify-content:center;">
    <span class="logo"><img class="logo-icon" src="static/img/logo.png" alt="">大学生职通车</span>
  </div>

  <!-- 价值主张 -->
  <div class="page-head hero">
    <h1>你的简历，HR 6 秒定生死</h1>
    <p>AI 找出致命伤，让你不被筛掉</p>
  </div>

  <!-- 上传区 -->
  <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.doc" hidden>
  <div class="upload-zone" id="uploadZone">
    <span class="up-icon" id="upIcon">📄</span>
    <div class="up-title" id="upTitle">点击上传简历</div>
    <div class="up-hint" id="upHint">非图片格式PDF · Word · 纯文本</div>
    <div class="up-proof">"HR 说我简历比 90% 候选人清晰" — 学姐 D，投字节跳动</div>
  </div>

  <!-- 提交按钮 -->
  <button class="btn btn-primary" id="btnSubmit" disabled style="margin-top:var(--sp-3);">
    免费诊断 →
  </button>

  <!-- 服务路线图 -->
  <div class="service-cards">
    <div class="service-card">
      <span class="sc-icon">📄</span>
      <span class="sc-title">免费诊断</span>
      <span class="sc-desc">HR 3 秒弃简历，因为你没写数字</span>
    </div>
    <div class="service-card">
      <span class="sc-icon">✨</span>
      <span class="sc-title">AI 优化</span>
      <span class="sc-desc">把"负责 XX"改成"交付 XX，提升 30%"</span>
    </div>
    <div class="service-card">
      <span class="sc-icon">❓</span>
      <span class="sc-title">追问预判</span>
      <span class="sc-desc">面试官追问"你做了什么"，不再卡壳</span>
    </div>
    <div class="service-card">
      <span class="sc-icon">🎤</span>
      <span class="sc-title">模拟面试</span>
      <span class="sc-desc">5 道 AI 定制面试题，提前演练不卡壳</span>
    </div>
  </div>

  <!-- 上传/诊断动画 -->
  <div id="uploadAnim" style="display:none;text-align:center;padding:var(--sp-6);">
    <div class="spinner" style="margin:0 auto var(--sp-3);"></div>
    <span id="animMsg" style="font-size:var(--fs-rp);color:var(--text-soft);">正在读取简历…</span>
    <div id="animTimer" style="font-size:var(--fs-xs);color:var(--text-fade);margin-top:var(--sp-2);"></div>
  </div>

  <!-- 历史记录（登录后动态展示） -->
  <div id="historySection" style="display:none;margin-top:var(--sp-6);">
    <div class="divider-text" style="margin-bottom:var(--sp-3);">—— 已有记录 ——</div>
    <a id="historyLink" href="#" style="text-decoration:none;">
      <div class="history-card">
        <div class="hc-left">
          <div class="hc-icon">📄</div>
          <div class="hc-info">
            <div class="hc-date" id="hcDate"></div>
            <div class="hc-summary" id="hcSummary"></div>
          </div>
        </div>
        <span class="hc-arrow">→</span>
      </div>
    </a>
  </div>

</div>

<script src="static/js/toast.js"></script>
<script type="module" src="static/js/pages/index.js"></script>
</body>
</html>
