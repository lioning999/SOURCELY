<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>优化结果 — 大学生职通车</title>
<link rel="stylesheet" href="static/css/common.css">
</head>
<body>
<div class="container">

  <!-- 顶栏 -->
  <div class="top-bar">
    <a href="index.html" class="back-btn">← 首页</a>
    <span class="logo"><img class="logo-icon" src="static/img/logo.png" alt="">大学生职通车</span>
  </div>

  <!-- 进度条 -->
  <div class="progress-bar">
    <div class="progress-step done"><span class="dot">✓</span>上传简历</div>
    <span class="progress-connector done"></span>
    <div class="progress-step done"><span class="dot">✓</span>免费诊断</div>
    <span class="progress-connector done"></span>
    <div class="progress-step active"><span class="dot">3</span>优化结果</div>
    <span class="progress-connector"></span>
    <div class="progress-step coming"><span class="dot">4</span>追问预判</div>
    <span class="progress-connector"></span>
    <div class="progress-step coming"><span class="dot">5</span>模拟面试</div>
  </div>

  <!-- 页面头 -->
  <div class="page-head">
    <h1 id="pageTitle">优化完成</h1>
  </div>

  <!-- 状态：加载 -->
  <div id="stateLoading" style="text-align:center;padding:var(--sp-10);">
    <div class="spinner" style="margin:0 auto var(--sp-3);"></div>
    <p style="color:var(--text-soft);">正在加载优化结果…</p>
  </div>

  <!-- 状态：未登录 -->
  <div id="stateLogin" style="display:none;text-align:center;padding:var(--sp-10);">
    <p style="color:var(--text-soft);margin-bottom:var(--sp-4);">此功能需要微信登录</p>
    <button class="btn btn-primary" onclick="window.location.href='/auth/wechat-login'">微信登录 →</button>
  </div>

  <!-- 状态：错误 -->
  <div id="stateError" style="display:none;text-align:center;padding:var(--sp-10);">
    <p style="color:var(--danger);" id="errorMsg"></p>
    <button class="btn btn-secondary" id="btnRetry" style="margin-top:var(--sp-4);">重新加载</button>
  </div>

  <!-- 状态：空 -->
  <div id="stateEmpty" style="display:none;text-align:center;padding:var(--sp-10);">
    <p style="color:var(--text-soft);">缺少诊断ID，请先诊断简历</p>
    <a href="index.html" class="btn btn-primary" style="margin-top:var(--sp-4);">返回首页 →</a>
  </div>

  <!-- 状态：未打赏 -->
  <div id="statePay" style="display:none;text-align:center;padding:var(--sp-4);">
    <p style="color:var(--text);font-weight:700;font-size:var(--fs-l);">此功能需打赏</p>
    <p style="color:var(--text-soft);margin-top:var(--sp-1);margin-bottom:var(--sp-4);">¥1 解锁全文优化</p>
    <p style="color:var(--text-soft);font-size:var(--fs-rpp);line-height:1.8;margin-bottom:var(--sp-3);">
      ✅ 全文逐段重写<br>
      ✅ 每段 before/after 对比<br>
      ✅ 面试追问预判 + 答题思路
    </p>
    <a id="btnBuyFromResult" href="#" class="btn btn-primary">打赏 ¥1 →</a>
  </div>

  <!-- 主内容 -->
  <div id="mainContent" style="display:none;">

    <!-- 修复摘要 -->
    <div class="diagnosis-summary" id="resultSummary" style="margin-bottom:var(--sp-3);"></div>

    <!-- 优化后简历 -->
    <div class="section-card">
      <div class="section-header open" id="headerResume">
        <span class="section-title">优化后简历</span>
        <span class="chevron">▾</span>
      </div>
      <div class="section-body open" id="bodyResume">
        <div class="opt-text" id="optimizedText"></div>
      </div>
    </div>

    <!-- 逐段对比 -->
    <div class="section-card" id="compareCard">
      <div class="section-header open" id="headerCompare">
        <span class="section-title" id="compareTitle">改了什么</span>
        <span class="chevron" id="chevronCompare">▾</span>
      </div>
      <div class="section-body open" id="bodyCompare">
        <div id="compareBody"></div>
        <div id="resultPrinciples" style="text-align:center;font-size:var(--fs-xs);color:var(--text-fade);margin-top:var(--sp-3);display:none;"></div>
      </div>
    </div>

    <!-- 追问预判入口 -->
    <div class="section-card" id="qaEntry" style="text-align:center;">
      <p style="font-size:var(--fs-rpp);color:var(--text);margin-bottom:var(--sp-1);">
        🎯 面试官会根据你的简历追问什么？
      </p>
      <p style="font-size:var(--fs-xs);color:var(--text-fade);margin-bottom:var(--sp-3);">
        AI 已分析你的简历弱点，生成追问靶子 + 答题思路
      </p>
      <a id="btnToQA" class="btn btn-primary" href="#">查看追问预判 →</a>
    </div>

  </div>

  <!-- 免责 -->
  <div class="disclaimer">诊断结果基于 AI 模型，仅供参考</div>

</div>
<script src="static/js/toast.js"></script>
<script type="module" src="static/js/pages/result.js"></script>
</body>
</html>
