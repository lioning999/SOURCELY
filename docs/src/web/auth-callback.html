<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录中…</title>
<style>
  body { display:flex; align-items:center; justify-content:center; height:100vh;
         font-family:system-ui; background:#F6F3EE; color:#2C2C2C; margin:0; }
  .box { text-align:center; }
  .spinner { width:32px; height:32px; border:3px solid #E0DCD4;
              border-top-color:#E8856C; border-radius:50%; animation:spin .8s linear infinite;
              margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>正在登录…</p>
</div>
<script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    if (!code) {
      document.querySelector('.box').innerHTML =
        '<p style="color:red">授权失败：未获取到授权码</p>' +
        '<a href="/" style="color:#E8856C;">返回首页</a>';
      return;
    }

    fetch('/auth/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.access_token) {
        localStorage.setItem('accessToken', data.access_token);
        window.location.href = '/index.html';
      } else {
        document.querySelector('.box').innerHTML =
          '<p style="color:red">登录失败：' + (data.message || '未知错误') + '</p>' +
          '<a href="/" style="color:#E8856C;">返回首页</a>';
      }
    })
    .catch(function() {
      document.querySelector('.box').innerHTML =
        '<p style="color:red">网络错误，请重试</p>' +
        '<button onclick="location.reload()" style="margin-top:12px;padding:8px 24px;' +
        'background:#E8856C;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">' +
        '重新尝试</button>';
    });
  })();
</script>
</body>
</html>
