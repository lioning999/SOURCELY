<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单看板 — 源采 Sourcely</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700;900&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/css/index.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" style="text-decoration:none;">
    <div class="brand">
      <span class="brand-cn">源采</span>
      <span class="brand-en">SOURCELY</span>
    </div>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link" data-i18n="nav.analyze">分析</a>
    <a href="checkout.html" class="nav-link" data-i18n="nav.order">下单</a>
    <a href="admin.html" class="nav-link active" data-i18n="nav.admin">后台</a>
  </div>
  <select id="langSwitcher" class="lang-sw" aria-label="Language">
    <option value="zh">中文</option>
    <option value="en">English</option>
    <option value="vi">Tiếng Việt</option>
  </select>
</nav>

<main class="view active" style="display:block;">

  <section class="admin-card">
    <div class="admin-head">
      <h2 data-i18n="admin.title">订单看板</h2>
      <span data-i18n="admin.count">共 3 笔订单 · 已收定金 $30.95</span>
    </div>

    <div style="overflow-x:auto;">
    <table class="atbl">
      <thead><tr>
        <th data-i18n="admin.col.order">订单号</th>
        <th data-i18n="admin.col.product">商品</th>
        <th data-i18n="admin.col.customer">客户</th>
        <th data-i18n="admin.col.deposit">定金</th>
        <th data-i18n="admin.col.status">状态</th>
        <th data-i18n="admin.col.action">操作</th>
      </tr></thead>
      <tbody>
        <tr>
          <td>#001</td><td>泳衣 ×2</td><td data-i18n="admin.customer1">张三 · 泰国</td><td data-price-usd="13.45">$13.45</td>
          <td><span class="st pending" data-i18n="admin.st.pending">待采购</span></td>
          <td><button class="btn-sm" onclick="updateStatus(this,'ordered')" data-i18n="admin.btn.ordered">已下单 1688</button></td>
        </tr>
        <tr>
          <td>#002</td><td>泳衣 ×2</td><td data-i18n="admin.customer2">Linh · 越南</td><td data-price-usd="13.50">$13.50</td>
          <td><span class="st ordered" data-i18n="admin.st.ordered">已采购</span></td>
          <td><button class="btn-sm" onclick="updateStatus(this,'received')" data-i18n="admin.btn.received">已收货拍照</button></td>
        </tr>
        <tr>
          <td>#003</td><td>泳衣 ×1</td><td data-i18n="admin.customer3">Maria · 印尼</td><td data-price-usd="4.00">$4.00</td>
          <td><span class="st photos" data-i18n="admin.st.photos">照片已发</span></td>
          <td>
            <button class="btn-sm" onclick="updateStatus(this,'paid')" data-i18n="admin.btn.paid">客户付尾款</button>
            <button class="btn-sm" style="margin-top:4px" onclick="updateStatus(this,'shipped')" data-i18n="admin.btn.shipped">已发货</button>
          </td>
        </tr>
      </tbody>
    </table>
    </div>

    <div style="margin-top:var(--s6);padding-top:var(--s5);border-top:1px dotted var(--line);">
      <h3 class="sub-label" data-i18n="admin.flow">用户侧进度条</h3>
      <div class="flow-wrap">
        <span class="flow-step done" data-i18n="admin.flow.step1">1. 定金已付</span>
        <span class="flow-sep">···</span>
        <span class="flow-step current" data-i18n="admin.flow.step2">2. 已验货拍照</span>
        <span class="flow-sep">···</span>
        <span class="flow-step" data-i18n="admin.flow.step3">3. 已发货</span>
      </div>
    </div>
  </section>
</main>

<script src="static/js/i18n.js"></script>
<script>
I18N.init().then(function() {
  var sw = document.getElementById('langSwitcher');
  if (sw) {
    sw.addEventListener('change', function() {
      I18N.switchTo(sw.value).then(function() { I18N.formatAllPrices(); });
    });
  }
});

function updateStatus(btn, status) {
  var labels = {
    ordered: { text: '已下单 1688', cls: 'ordered' },
    received: { text: '已收货拍照', cls: 'ordered' },
    photos: { text: '照片已发送', cls: 'photos' },
    paid: { text: '尾款已付', cls: 'paid' },
    shipped: { text: '已发货', cls: 'paid' },
  };
  var label = labels[status];
  var td = btn.closest('td');
  var st = td.parentElement.querySelector('.st');
  st.textContent = label.text;
  st.className = 'st ' + label.cls;
  btn.remove();
  updateFlow();
}

function updateFlow() {
  var statuses = document.querySelectorAll('.atbl .st');
  var allShipped = Array.from(statuses).every(function(s) { return s.textContent === '已发货'; });
  if (allShipped) {
    var steps = document.querySelectorAll('.flow-step');
    steps.forEach(function(s) { s.classList.remove('current'); s.classList.add('done'); });
  }
}
</script>
</body>
</html>
